# PostgreSQL tools: extensions, query stats, connection pools

pg_connection_pool_plan_gate: &pg_connection_pool_plan_gate |
  **PgBouncer connection pools** â€” `aiven_pg_bouncer_create`, `aiven_pg_bouncer_update`, and `aiven_pg_bouncer_delete` call Aivenâ€™s `connection_pool` API.

  **Plan gate â€” call `aiven_service_get` first.** Read `service.plan` (string). Do **not** call these tools if the plan does not support connection pooling; tell the user they need a higher tier instead of attempting the API.

  **Plans that do _not_ include connection pooling:** `free-1-1gb`, `free-1-5gb`, any `free-*` plan, and **`hobbyist`**.

  **Plans that support connection pooling:** `startup-*`, `business-*`, and `premium-*` (e.g. `startup-4`, `business-8`).

  If the API returns **403** with a message about the service plan not including connection pooling, interpret that as a **plan limitation**, not necessarily a missing token permission.

tools:
  - name: aiven_pg_service_available_extensions
    method: GET
    path: /project/{project}/service/{service_name}/pg/available-extensions
    category: pg
    append_list_picker_hint: true

  - name: aiven_pg_service_query_statistics
    method: POST
    path: /project/{project}/service/{service_name}/pg/query/stats
    category: pg
    readOnly: true

    description: |
      This tool returns **`queries`**: an array of one row per normalized query with:
      - **Query identity:** `query` (SQL text, may use `$1` placeholders), `queryid` (internal id), `database_name`, `user_name`
      - **Execution counts:** `calls`, `rows` (total rows returned/fetched)
      - **Time (ms):** `total_time`, `min_time`, `max_time`, `mean_time`, `stddev_time`; plan timing: `total_plan_time`, `min_plan_time`, `max_plan_time`, `mean_plan_time`, `stddev_plan_time` (often `0` when planning is not tracked separately)
      - **Buffer I/O:** `shared_blks_hit` / `read` / `dirtied` / `written`, `local_blks_*`, `temp_blks_read` / `temp_blks_written`; `blk_read_time`, `blk_write_time` (block I/O time)
      - **WAL:** `wal_records`, `wal_fpi`, `wal_bytes` (may be string or numeric)

  - name: aiven_pg_bouncer_create
    method: POST
    path: /project/{project}/service/{service_name}/connection_pool
    category: pg
    description: *pg_connection_pool_plan_gate

  - name: aiven_pg_bouncer_update
    method: PUT
    path: /project/{project}/service/{service_name}/connection_pool/{pool_name}
    category: pg
    description: *pg_connection_pool_plan_gate

  - name: aiven_pg_bouncer_delete
    method: DELETE
    path: /project/{project}/service/{service_name}/connection_pool/{pool_name}
    category: pg
    description: *pg_connection_pool_plan_gate
