# Core tools: projects, services, logs, events
tools:
  - name: aiven_project_list
    method: GET
    path: /project
    category: core
    append_list_picker_hint: true
    response_filter:
      key: projects
      fields: [project_name, default_cloud, organization_id, tags]
    description: |
      List all Aiven projects. ALWAYS call this first to get valid `project` names ŌĆö never guess project names.
      This tool returns a list of projects with the following fields:
      - project_name: The name of the project
      - default_cloud: The default cloud for the project
      - organization_id: The ID of the organization the project belongs to
      - tags: The tags associated with the project

  - name: aiven_project_get
    method: GET
    path: /project/{project}
    category: core

  - name: aiven_list_project_clouds
    method: GET
    path: /project/{project}/clouds
    category: core
    append_list_picker_hint: true
    response_filter:
      key: clouds
      fields: [cloud_name, cloud_description, provider, geo_region]
    description: |
      List clouds available for a project (regions/providers Aiven supports for deployment). Requires a valid `project` from `aiven_project_list`.

      Each cloud entry contains:
      - cloud_name: Region identifier used in APIs (e.g. `aws-eu-west-1`, `google-europe-west1`)
      - cloud_description: Human-readable region label
      - provider: Cloud vendor (e.g. `aws-eu-central-2`, `google-europe-north2`)
      - geo_region: Broad geography (e.g. `europe`, `north america`)

  - name: aiven_service_type_plans
    method: GET
    path: /project/{project}/service-types/{service_type}/plans
    category: core
    append_list_picker_hint: true
    response_filter:
      key: service_plans
      fields: [service_plan]
    description: |
      List available plans for a service type. Requires `project` ŌĆö use `aiven_project_list` first if unknown.

      Each plan may include **`regions`** (and sometimes **`clouds`**) describing where that plan can run. Use those fields to show the user **which cloud names** (e.g. `do-fra`, `aws-eu-central-1`) are valid for their chosen plan before calling `aiven_service_create`.

      **Pricing is not included in this response.** Prices vary by cloud region. Use `aiven_service_plan_pricing` to get pricing for a specific plan and cloud.
      
      This tool returns a list of service plans with the following fields:
      - service_plan: The name of the service plan

  - name: aiven_service_plan_pricing
    method: GET
    path: /project/{project}/pricing/service-types/{service_type}/plans/{service_plan}/clouds/{cloud}
    category: core
    readOnly: true
    append_list_picker_hint: true
    description: |
      Get pricing for a specific service plan in a specific cloud region. Returns hourly USD price.

      Use `aiven_service_type_plans` to list available plans, and `aiven_list_project_clouds` to list available clouds.

  - name: aiven_service_create
    method: POST
    path: /project/{project}/service
    category: core
    append_list_picker_hint: true
    defaults:
      project_vpc_id: null
    response_filter:
      key: service
      fields: [service_name, service_type, state, plan, cloud_name]
    description: |
      Create a new Aiven service. Always call `aiven_service_type_plans` first, present plans to the user, and let them choose before creating. Do not pick a plan yourself.

      **Cloud (`cloud`) ŌĆö never guess or silently default.** After the user picks a plan, show valid cloud names from that planŌĆÖs **`regions` / `clouds`** in the `aiven_service_type_plans` response and **ask which cloud they want**. Do not invent a region (e.g. do not assume `do-fra`). If per-plan clouds are unclear, call `aiven_list_project_clouds` and still require an **explicit user choice** unless they told you to use a specific cloud or the projectŌĆÖs default.

      For PostgreSQL, set `user_config: {"pg_version": "17"}`. After creation, tell the user the service is provisioning (takes a few minutes) and ask them to tell you when to check the status. Do NOT poll `aiven_service_get` in a loop.

      **Read replica:** set `service_to_fork_from` to the primary and `user_config.pg_read_replica: true`.

      This tool returns a `service` object with the following fields:
      - service_name: Name of the service
      - service_type: Service type (e.g. `pg`, `kafka`)
      - state: Provisioning lifecycle (e.g. `BUILDING`, `REBUILDING`, `RUNNING`; not always `RUNNING` immediately after create)
      - plan: Selected plan identifier
      - cloud_name: Cloud region identifier where the service runs

  - name: aiven_service_get
    method: GET
    path: /project/{project}/service/{service_name}
    category: core
    exclude_params: [include_secrets]
    description: |
      Get service information. `project` must be a valid Aiven project name from `aiven_project_list`.
      If the service `state` is not `RUNNING`, return the status to the user and stop. Do NOT call this tool again in a loop ŌĆö let the user decide when to re-check.

      **Returns:** A `service` object; exact keys depend on `service_type` (Postgres example below). Not an exhaustive listing.

      **Core:** `service_name`, `service_type`, `service_type_description`, `state`, `plan`, optional `plan_price_usd`, `cloud_name`, `cloud_description`, `tags`, `create_time`, `update_time`, `termination_protection`, sizing (`disk_space_mb`, `node_count`, node CPU/memory, `metadata` such as `pg_version`), `features`, `maintenance`, `service_notifications`, `tech_emails`, `project_vpc_id`, **`service_integrations`**, **`server_group`**, `cmk_id`, `group_list`, `is_cluster_plan`.

      **Connectivity:** **`components`** (hosts, ports, roles such as primary/replica), **`connection_info`**, **`service_uri`**, **`service_uri_params`**. Sensitive values appear as **`[REDACTED]`** through this MCP.

      **PostgreSQL / engine-specific:** `databases`, **`backups`**, **`connection_pools`**, replica/standby entries in `connection_info`, **`users`**, **`user_config`** (e.g. backups, `ip_filter`, engine tuning).

      **Infrastructure:** **`node_states`** (per-node AZ, role, lifecycle).

  - name: aiven_service_update
    method: PUT
    path: /project/{project}/service/{service_name}
    category: core
    destructive: true
    defaults:
      project_vpc_id: null
    description: |
      Update an existing Aiven service.

      Can change: plan, cloud region, user configuration, power state.

      **Warning:** Plan changes may cause brief service downtime during migration. Confirm with the user before changing plans.

      **Common user_config changes:**

      Enable Kafka Connect on a Kafka service:
      ```
      aiven_service_update(project="my-project", service_name="my-kafka",
        user_config={"kafka_connect": true})
      ```

      Enable Schema Registry (Karapace) on a Kafka service:
      ```
      aiven_service_update(project="my-project", service_name="my-kafka",
        user_config={"schema_registry": true})
      ```

      Enable tiered storage on a Kafka service:
      ```
      aiven_service_update(project="my-project", service_name="my-kafka",
        user_config={"tiered_storage": {"enabled": true}})
      ```

      Set PostgreSQL version:
      ```
      aiven_service_update(project="my-project", service_name="my-pg",
        user_config={"pg_version": "17"})
      ```

  - name: aiven_project_get_service_logs
    method: POST
    path: /project/{project}/service/{service_name}/logs
    category: core
    readOnly: true

  - name: aiven_service_query_activity
    method: POST
    path: /project/{project}/service/{service_name}/query/activity
    category: core
    readOnly: true

  - name: aiven_service_metrics_fetch
    method: POST
    path: /project/{project}/service/{service_name}/metrics
    category: core
    readOnly: true

    description: |
      Fetch metrics for **managed data services** (PostgreSQL, Kafka, OpenSearch, etc.) ŌĆö i.e. not `service_type: application`.

      **Do not use** for **application** services (custom apps deployed as an Aiven ŌĆ£applicationŌĆØ service). For those, use **`aiven_service_application_metrics_get`** instead (GET `ŌĆ”/application/metrics`). If unsure, call `aiven_service_get` first and check `service_type`.

      Use `period` to control the time window: `hour`, `day`, `week`, `month`, or `year`.
      For Kafka services, optionally pass `kafka_topic_name` to get topic-level metrics.

      **Display format:** Render ALL metrics as a single ASCII dashboard using box-drawing characters (ŌöīŌöĆŌöÉŌöéŌööŌöś) and progress bars (Ō¢łŌ¢æ). One section per metric group. Show every metric returned ŌĆö do not summarize or omit. Do NOT use markdown tables or bullet points. Do NOT generate scripts. Render directly as text. Add a blank line between each metric row for readability.

  # Not in public OpenAPI ŌĆö schema is maintained here (see generator manual_schema).
  - name: aiven_service_application_metrics_get
    method: GET
    path: /project/{project}/service/{service_name}/application/metrics
    category: core
    readOnly: true
    manual_schema:
      type: object
      properties:
        project:
          type: string
        service_name:
          type: string
      required:
        - project
        - service_name
    manual_strict: true
    description: |
      **Preferred tool** when the user asks for **application** metrics, or the target is an **application** service (`service_type: application`).

      Calls **`GET ŌĆ”/application/metrics`**. Do **not** use `aiven_service_metrics_fetch` for these ŌĆö that tool targets **`POST ŌĆ”/metrics`** for managed data services only.

      If the service type is unknown, call **`aiven_service_get`** first, then choose this tool if `service_type` is `application`.

  - name: aiven_project_vpc_list
    method: GET
    path: /project/{project}/vpcs
    category: core
    readOnly: true
    response_filter:
      key: vpcs
      fields: [project_vpc_id, cloud_name, state, network_cidr]
    description: |
      List VPCs for a project. Returns each VPC's ID, cloud, state, and network CIDR.

      Use this when deploying an application service fails with "please specify project_vpc_id" (i.e. the project has multiple active VPCs). List them, show the user the options, and let them pick which VPC to deploy into.

      VPCs with state `ACTIVE` are ready to use. Pass the chosen `project_vpc_id` to `aiven_application_deploy`.

      This tool returns a list of VPCs with the following fields:
      - project_vpc_id: The ID of the VPC
      - cloud_name: The cloud region identifier where the VPC runs (e.g. `aws-eu-central-2`, `google-europe-north2`)
      - state: The state of the VPC (e.g. `ACTIVE`, `APPROVED`)
      - network_cidr: The network CIDR of the VPC

  - name: aiven_project_get_event_logs
    method: GET
    path: /project/{project}/events
    category: core
    append_list_picker_hint: true
