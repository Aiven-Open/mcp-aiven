  - target: "$.paths['/project/{project}/service'].post"
    description: Create service — types not in schema
    update:
      x-mcp-description: |
        Create a new Aiven managed service.

        **Service Types:**
        - `pg`: PostgreSQL database with high availability
        - `kafka`: Apache Kafka streaming platform
        - `clickhouse`: ClickHouse analytics database
        - `opensearch`: OpenSearch search and analytics
        - `redis`: Redis in-memory database
        - `mysql`: MySQL database
        - `grafana`: Grafana dashboards
        - `flink`: Apache Flink stream processing

        **Example clouds:** google-us-east1, aws-us-west-2, azure-eastus
        **Example plans:** startup-4, business-8, premium-16

        **IMPORTANT:** `user_config` is a nested object with service-specific settings. For PostgreSQL, always set `pg_version`.

        **Example — create a PostgreSQL service:**
        ```
        aiven_service_create(
          project="my-project",
          service_name="my-pg",
          service_type="pg",
          plan="startup-4",
          cloud="google-europe-west1",
          user_config={"pg_version": "17"}
        )
        ```

        **IMPORTANT:** After creation, do NOT immediately call any other tools on this service. The service takes a few minutes to provision. Tell the user to wait and check the service state later with `aiven_service_get` — it must reach `state: RUNNING` before it can accept connections or queries.

        **Forking:** To fork from an existing service, set `service_to_fork_from` (and optionally `project_to_fork_from` for cross-project forks). Use `recovery_target_time` for point-in-time recovery.

        **Example — create a Kafka service with Kafka Connect and Schema Registry:**
        ```
        aiven_service_create(
          project="my-project",
          service_name="my-kafka",
          service_type="kafka",
          plan="business-4",
          cloud="google-europe-west1",
          user_config={"kafka_connect": true, "schema_registry": true}
        )
        ```

        **Read replica:** To create a PG read replica, use `service_to_fork_from` pointing to the primary, and set `user_config.pg_read_replica: true`. Then create a `read_replica` integration between the primary and the replica using the service integration endpoint.

  - target: '$.components.schemas.ServiceCreateRequestBody.properties'
    description: Add fork parameters to ServiceCreate
    update:
      service_to_fork_from:
        type: string
        maxLength: 64
        description: 'Name of an existing service to fork from. The new service will be a copy (fork) of the specified service.'
      project_to_fork_from:
        type: string
        maxLength: 63
        description: 'Project containing the service to fork from. Only required for cross-project forks; defaults to the target project.'
      recovery_target_time:
        type: string
        description: 'ISO 8601 timestamp for point-in-time recovery when forking (e.g. 2025-01-15T12:00:00Z). Only applicable when service_to_fork_from is set.'

  - target: '$.components.schemas.ServiceCreateRequestBody.properties.project_vpc_id'
    description: Allow null to explicitly place service on public internet
    update:
      nullable: true

  - target: '$.components.schemas.ServiceUpdateRequestBody.properties.project_vpc_id'
    description: Allow null to move service to public internet
    update:
      nullable: true

  - target: "$.paths['/project/{project}/service/{service_name}'].put"
    description: Update service — downtime warning
    update:
      x-mcp-description: |
        Update an existing Aiven service.

        Can change: plan, cloud region, user configuration, power state.
        Plan changes may cause brief downtime during migration.

        **Common user_config changes:**

        Enable Kafka Connect on a Kafka service:
        ```
        aiven_service_update(project="my-project", service_name="my-kafka",
          user_config={"kafka_connect": true})
        ```

        Enable Schema Registry (Karapace) on a Kafka service:
        ```
        aiven_service_update(project="my-project", service_name="my-kafka",
          user_config={"schema_registry": true})
        ```

        Enable tiered storage on a Kafka service:
        ```
        aiven_service_update(project="my-project", service_name="my-kafka",
          user_config={"tiered_storage": {"enabled": true}})
        ```

        Set PostgreSQL version:
        ```
        aiven_service_update(project="my-project", service_name="my-pg",
          user_config={"pg_version": "17"})
        ```

  - target: "$.paths['/project/{project}/service/{service_name}'].delete"
    description: Delete service — too destructive for LLM
    update:
      x-mcp-exclude: true
