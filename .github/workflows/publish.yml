name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true
          registry-url: https://registry.npmjs.org
          cache: false
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: npm publish

  notify-slack:
    runs-on: ubuntu-latest
    needs: publish
    if: always() && (secrets.SLACK_WEBHOOK_PUBLISH_SUCCESS != '' || secrets.SLACK_WEBHOOK_PUBLISH_FAILURE != '')
    steps:
      - name: Notify Slack (publish)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION}"

          if [ "${{ needs.publish.result }}" = "success" ]; then
            WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_PUBLISH_SUCCESS }}"
            COLOR="good"
            TITLE="mcp-aiven ${VERSION} published to npm"
          else
            WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_PUBLISH_FAILURE }}"
            COLOR="danger"
            TITLE="mcp-aiven ${VERSION} npm publish FAILED"
          fi

          if [ -z "$WEBHOOK_URL" ]; then
            echo "No webhook configured for this result, skipping"
            exit 0
          fi

          curl -sf -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"title\":\"$TITLE\",\"text\":\"<$RELEASE_URL|View release>\"}]}"
