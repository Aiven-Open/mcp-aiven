name: Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  permission-probe:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Probe fork PR token write capability without changing repo state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          body='{"message":"probe","content":"cHJvYmU=","branch":"permission-probe-nonexistent-branch"}'
          code=$(curl -sS -o response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/Aiven-Open/mcp-aiven/contents/.permission-probe \
            -d "${body}")
          echo "permission_probe_http=${code}"
          sed -n '1,80p' response.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API types
        run: pnpm generate:api-types

      - name: Generate schemas
        run: pnpm generate

      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API types
        run: pnpm generate:api-types

      - name: Generate schemas
        run: pnpm generate

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API types
        run: pnpm generate:api-types

      - name: Generate schemas
        run: pnpm generate

      - name: Run unit tests
        run: pnpm test -- --run

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API types
        run: pnpm generate:api-types

      - name: Generate schemas
        run: pnpm generate

      - name: Build
        run: pnpm build
